<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Generator Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Carousel Maker</h1>
        </header>

        <div id="input-screen" class="screen active">
            <p class="subtitle">Desain Konten Anda</p>

            <div class="upload-card">
                <label for="bg-input" class="upload-label">
                    <span id="upload-text">📸 Upload Gambar Seamless (Opsional)</span>
                </label>
                <input type="file" id="bg-input" accept="image/*" style="display: none;">
            </div>

            <div id="slide-inputs-container">
                </div>
            
            <button id="generate-btn" class="ios-btn primary">Generate Carousel</button>
        </div>

        <div id="review-screen" class="screen">
            <p class="subtitle">Geser untuk review transisi</p>
            
            <div class="carousel-wrapper">
                <div class="swiper mySwiper">
                    <div class="swiper-wrapper" id="carousel-content">
                        </div>
                    <div class="swiper-pagination"></div>
                </div>
            </div>

            <div class="action-buttons">
                <button id="back-btn" class="ios-btn secondary">Edit Lagi</button>
                <button id="download-btn" class="ios-btn primary">Download Semua</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Maker Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007AFF">
    <link rel="apple-touch-icon" href="logo-192.png">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Carousel Maker</h1>
        </header>

        <div id="input-screen" class="screen active">
            <p class="subtitle">Masukkan teks mentah Anda di sini</p>

            <div class="upload-card">
                <label for="bg-input" class="upload-label">
                    <span id="upload-text"> Upload Gambar Seamless (Opsional)</span>
                </label>
                <input type="file" id="bg-input" accept="image/*" style="display: none;">
            </div>

            <div id="slide-inputs-container">
                <!-- Inputs di-generate oleh JS -->
            </div>
            
            <button id="add-slide-btn" class="ios-btn secondary" style="margin-bottom: 15px;">+ Tambah Slide</button>
            <button id="generate-btn" class="ios-btn primary">Mulai Desain (Review)</button>
        </div>

        <div id="review-screen" class="screen">
            <p class="subtitle">Ketuk teks pada slide untuk mengubah gaya</p>
            
            <div class="global-settings" style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 10px 15px; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);">
                <label style="font-size: 13px; font-weight: 700; color: var(--text-muted);">Ukuran Canvas</label>
                <select id="select-ratio" class="style-select" style="padding: 6px 12px; font-size: 14px; border: none; background: #F2F2F7; cursor: pointer;">
                    <option value="4/5">4:5 (IG Portrait)</option>
                    <option value="1/1">1:1 (IG/LinkedIn Square)</option>
                    <option value="3/4">3:4 (FB/Twitter)</option>
                    <option value="9/16">9:16 (Story/Reels)</option>
                    <option value="16/9">16:9 (Landscape)</option>
                </select>
            </div>
            
            <div class="carousel-wrapper">
                <div class="swiper mySwiper">
                    <div class="swiper-wrapper" id="carousel-content">
                        <!-- Slides di-generate oleh JS -->
                    </div>
                    <div class="swiper-pagination"></div>
                </div>
            </div>

            <div id="style-panel" class="hidden">
                <div class="style-row" style="margin-bottom: 10px;">
                    <div class="style-group">
                        <label>Format Kata (Blok Teks Dulu)</label>
                        <div class="btn-group">
                            <button id="btn-format-bold" style="font-weight: 900;">B</button>
                            <button id="btn-format-italic" style="font-style: italic; font-family: serif;">I</button>
                            <button id="btn-format-upper">AA</button>
                            <button id="btn-format-cali" style="font-family: 'Dancing Script', cursive;">Cal</button>
                        </div>
                    </div>
                </div>

                <div class="style-row">
                    <div class="style-group">
                        <label>Ukuran Teks</label>
                        <div class="btn-group">
                            <button id="btn-size-down">A-</button>
                            <button id="btn-size-up">A+</button>
                        </div>
                    </div>
                    <div class="style-group">
                        <label>Jarak Baris</label>
                        <div class="btn-group">
                            <button id="btn-lh-down">↕-</button>
                            <button id="btn-lh-up">↕+</button>
                        </div>
                    </div>
                </div>
                
                <div class="style-row">
                    <div class="style-group">
                        <label>Jenis Font (Blok Aktif)</label>
                        <select id="select-font" class="style-select">
                            <option value="'Gilroy', sans-serif">Gilroy (Default)</option>
                            <option value="'Dancing Script', cursive">Calligraphy</option>
                        </select>
                    </div>
                    <div class="style-group">
                        <label>Ketebalan (Gilroy)</label>
                        <select id="select-weight" class="style-select">
                            <option value="900">Heavy</option>
                            <option value="700">Bold</option>
                            <option value="600">Semi Bold</option>
                            <option value="500">Medium</option>
                            <option value="400">Regular</option>
                        </select>
                    </div>
                </div>

                <div class="style-row">
                    <div class="style-group">
                        <label>Rata Teks</label>
                        <div class="btn-group">
                            <button id="btn-align-left">Kiri</button>
                            <button id="btn-align-center">Tengah</button>
                            <button id="btn-align-right">Kanan</button>
                        </div>
                    </div>
                    <div class="style-group">
                        <label>Warna</label>
                        <input type="color" id="input-color" value="#1C1C1E" class="color-picker">
                    </div>
                </div>

                <!-- FITUR BARU: Geser Posisi Vertikal -->
                <div class="style-row">
                    <div class="style-group" style="flex: 1;">
                        <label>Geser Posisi Teks (Atas/Bawah)</label>
                        <input type="range" id="input-pos-y" min="-200" max="200" value="0" style="width: 100%; margin-top: 5px;">
                    </div>
                </div>

            </div>

            <div class="action-buttons">
                <button id="back-btn" class="ios-btn secondary">Kembali</button>
                <button id="download-btn" class="ios-btn primary">Download Semua</button>
            </div>
        </div>
    </div>

    <!-- Toast UI -->
    <div id="exit-toast" style="position:fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 9999;">
        Tekan sekali lagi untuk keluar
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(error => { console.log('SW failed:', error); });
            });
        }
    </script>
</body>
</html>

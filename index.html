<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Generator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Carousel Maker</h1>
        </header>

        <div id="input-screen" class="screen active">
            <p class="subtitle">Masukkan teks untuk 5 slide Anda</p>
            <div class="input-group"><textarea id="text1" placeholder="Isi teks slide 1..."></textarea></div>
            <div class="input-group"><textarea id="text2" placeholder="Isi teks slide 2..."></textarea></div>
            <div class="input-group"><textarea id="text3" placeholder="Isi teks slide 3..."></textarea></div>
            <div class="input-group"><textarea id="text4" placeholder="Isi teks slide 4..."></textarea></div>
            <div class="input-group"><textarea id="text5" placeholder="Isi teks slide 5..."></textarea></div>
            
            <button id="generate-btn" class="ios-btn primary">Generate Carousel</button>
        </div>

        <div id="review-screen" class="screen">
            <p class="subtitle">Geser untuk review transisi</p>
            
            <div class="carousel-wrapper">
                <div class="swiper mySwiper">
                    <div class="swiper-wrapper" id="carousel-content">
                        </div>
                    <div class="swiper-pagination"></div>
                </div>
            </div>

            <div class="action-buttons">
                <button id="back-btn" class="ios-btn secondary">Edit Teks</button>
                <button id="download-btn" class="ios-btn primary">Download (Segera)</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
